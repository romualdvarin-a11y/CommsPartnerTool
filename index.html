// ─── Notion field mapping ───
const NOTION_CHANNEL_MAP={
  'In-product':'In-product (UX step)','Website/SEO':'Website','Paid ads':'Paid Ads',
  'CRM':'CRM / Email','Sales/CSD/BPO':'Enablement (internal)','Community':'Community',

};
const NOTION_STATUS_MAP={'To do':'not_started','In progress':'in_progress','Done':'done'};

function parseNotionJSON(raw){
  try{
    const rows=typeof raw==='string'?JSON.parse(raw):raw;
    if(!Array.isArray(rows)) throw new Error('Expected an array of rows');
    // Detect Notion format: rows have "Touchpoint","Phase","Channel" etc.
    const isNotion=rows[0]&&('Touchpoint' in rows[0]||'Phase' in rows[0]||'Channel' in rows[0]);
    if(!isNotion) throw new Error('NOT_NOTION');
    // Extract unique phases as stages
    const phaseSet=new Set();
    rows.forEach(r=>{if(r.Phase)phaseSet.add(r.Phase)});
    const phaseOrder=['Awareness','Consideration','Acquisition','Decision','Activation','Card creation','In-app verification','In-app Discovery','Adoption','Ongoing usage','Payout & statement','Expansion','Upsell','Support','Retention','Tracking'];
    const phases=[...phaseSet].sort((a,b)=>{
      const ia=phaseOrder.findIndex(p=>a.toLowerCase().includes(p.toLowerCase()));
      const ib=phaseOrder.findIndex(p=>b.toLowerCase().includes(p.toLowerCase()));
      return (ia===-1?99:ia)-(ib===-1?99:ib);
    });
    const stageMap={};
    const stages=phases.map((p,i)=>{const id=uid();stageMap[p]=id;return{id,stage_name:p,stage_goal:'',position:i+1}});
    const touchpoints=rows.map(r=>{
      let channels=[];
      try{channels=typeof r.Channel==='string'&&r.Channel.startsWith('[')?JSON.parse(r.Channel):[r.Channel]}catch(e){channels=[r.Channel]}
      const ch=channels[0]||'';
      const mappedCh=NOTION_CHANNEL_MAP[ch]||ch;
      let assets=[];
      try{assets=typeof r['Asset type']==='string'&&r['Asset type']?.startsWith('[')?JSON.parse(r['Asset type']):[r['Asset type']]}catch(e){}
      let owners=[];
      try{owners=typeof r.Owner==='string'&&r.Owner.startsWith('[')?JSON.parse(r.Owner):[r.Owner]}catch(e){owners=[r.Owner]}
      const ownerStr=owners.filter(Boolean).map(o=>typeof o==='string'&&o.startsWith('user://')?o.replace('user://','').slice(0,8)+'…':o).join(', ')||'';
      return{
        id:uid(),touchpoint_name:r.Touchpoint||r.Name||r.title||'Untitled',
        stage_id:stageMap[r.Phase]||stages[0]?.id||'',
        channel:mappedCh,touchpoint_type:assets.filter(Boolean).join(', ')||'',
        audience:['client'],market:['Global'],owner:ownerStr,
        team:[],status:NOTION_STATUS_MAP[r.Status]||'not_started',validated:'tbd',
        go_live_date:r['date:Target date:start']||'',
        end_date:r['date:Target date:end']||'',
        message_angle:r['Key message']||'',
        kick_off_date:'',eta_deliverables:'',
        asset_link:r.url||'',cta_label:'',variant:'',
        market_override:false,market_override_note:'',
        _objective:r.Objective||'',_deliverables:r['Deliverables - actions']||'',
      };
    });
    return{stages,touchpoints,source:'notion'};
  }catch(e){
    if(e.message==='NOT_NOTION') throw e;
    throw new Error('Could not parse data: '+e.message);
  }
}

function parseGenericJSON(raw){
  const data=typeof raw==='string'?JSON.parse(raw):raw;
  if(data.stages&&data.touchpoints) return{stages:data.stages,touchpoints:data.touchpoints,source:'generic'};
  throw new Error('Expected {stages:[...], touchpoints:[...]} format');
}

function parseCSV(text){
  const lines=text.trim().split('\n');
  if(lines.length<2)throw new Error('CSV needs a header + at least 1 row');
  const headers=lines[0].split(',').map(h=>h.trim().replace(/^"|"$/g,''));
  const rows=lines.slice(1).map(line=>{
    const vals=line.match(/("(?:[^"]|"")*"|[^,]*)/g)||[];
    const obj={};
    headers.forEach((h,i)=>{obj[h]=(vals[i]||'').trim().replace(/^"|"$/g,'').replace(/""/g,'"')});
    return obj;
  });
  // Check if it looks like Notion export
  if(headers.includes('Touchpoint')&&headers.includes('Phase')){
    return parseNotionJSON(rows);
  }
  // Generic CSV: expect Name/Touchpoint, Stage/Phase, Channel, Status columns
  const nameCol=headers.find(h=>/^(touchpoint|name|title)/i.test(h));
  const stageCol=headers.find(h=>/^(stage|phase)/i.test(h));
  const channelCol=headers.find(h=>/^channel/i.test(h));
  const statusCol=headers.find(h=>/^status/i.test(h));
  if(!nameCol)throw new Error('CSV must have a "Touchpoint" or "Name" column');
  const phaseSet=new Set();
  rows.forEach(r=>{const s=r[stageCol];if(s)phaseSet.add(s)});
  const stageMap={};
  const stages=[...phaseSet].map((p,i)=>{const id=uid();stageMap[p]=id;return{id,stage_name:p,stage_goal:'',position:i+1}});
  if(stages.length===0){const id=uid();stages.push({id,stage_name:'Uncategorized',stage_goal:'',position:1});stageMap['']='';stageMap[undefined]=id}
  const touchpoints=rows.map(r=>({
    id:uid(),touchpoint_name:r[nameCol]||'',stage_id:stageMap[r[stageCol]]||stages[0].id,
    channel:r[channelCol]||'',touchpoint_type:'',audience:['client'],market:['Global'],
    owner:r[headers.find(h=>/owner/i.test(h))]||'',team:[],
    status:NOTION_STATUS_MAP[r[statusCol]]||r[statusCol]||'not_started',validated:'tbd',
    go_live_date:r[headers.find(h=>/date|go.?live/i.test(h))]||'',end_date:'',
    message_angle:r[headers.find(h=>/message|angle/i.test(h))]||'',
    kick_off_date:'',eta_deliverables:'',asset_link:'',cta_label:'',variant:'',
    market_override:false,market_override_note:'',
  }));
  return{stages,touchpoints,source:'csv'};
}

// ─── UI primitives ───
function Pill({label,bg,color,dot,small,onClick,active}){
  return(<span onClick={onClick} style={{display:'inline-flex',alignItems:'center',gap:4,padding:small?'2px 8px':'4px 10px',borderRadius:20,fontSize:small?11:12,fontWeight:600,background:active===false?'transparent':bg||'#F5F5F5',color:color||'#616161',border:active===false?`1.5px solid ${bg||'#E0E0E0'}`:'1.5px solid transparent',cursor:onClick?'pointer':'default',whiteSpace:'nowrap',transition:'all .15s',userSelect:'none'}}>{dot&&<span style={{width:7,height:7,borderRadius:'50%',background:dot,flexShrink:0}}/>}{label}</span>);
}
function StatusBadge({status}){const s=ST[status]||ST.not_started;return<Pill label={s.l} bg={s.bg} color={s.t} small/>}
function ChannelBadge({channel}){const c=CH_COLORS[channel]||{bg:'#F5F5F5',t:'#616161',d:'#8F8F8F'};return<Pill label={channel} bg={c.bg} color={c.t} dot={c.d} small/>}
function Tip({children,warn,icon}){return<div className={`tip${warn?' warn':''}`}><span className="ico">{icon||(warn?'⚠️':'💡')}</span><div>{children}</div></div>}

// ─── Modal ───
function Modal({open,onClose,title,width,children}){
  if(!open)return null;
  return(<div style={{position:'fixed',inset:0,zIndex:1000,display:'flex',alignItems:'flex-start',justifyContent:'center',paddingTop:48,background:'rgba(0,0,0,.35)',backdropFilter:'blur(3px)'}} onClick={onClose}><div className="fade-in" onClick={e=>e.stopPropagation()} style={{background:'white',borderRadius:16,width:width||620,maxWidth:'94vw',maxHeight:'calc(100vh - 96px)',overflow:'auto',boxShadow:'var(--sh-lg)'}}><div style={{display:'flex',justifyContent:'space-between',alignItems:'center',padding:'20px 24px 0',position:'sticky',top:0,background:'white',zIndex:2,borderRadius:'16px 16px 0 0'}}><h2 style={{fontSize:18,fontWeight:700}}>{title}</h2><button onClick={onClose} style={{background:'var(--g50)',borderRadius:8,width:32,height:32,display:'flex',alignItems:'center',justifyContent:'center',fontSize:18,color:'var(--g600)'}}>×</button></div><div style={{padding:24}}>{children}</div></div></div>);
}

function Field({label,required,children,hint}){

}

function ChipSelect({options,value,onChange}){
  const toggle=(opt)=>{if(value.includes(opt))onChange(value.filter(v=>v!==opt));else onChange([...value,opt])};
  return(<div style={{display:'flex',flexWrap:'wrap',gap:5}}>{options.map(opt=><button key={opt} onClick={()=>toggle(opt)} style={{padding:'3px 11px',borderRadius:20,fontSize:12,fontWeight:600,background:value.includes(opt)?'var(--bk)':'var(--g50)',color:value.includes(opt)?'white':'var(--g600)',border:`1.5px solid ${value.includes(opt)?'var(--bk)':'var(--g200)'}`,transition:'all .15s'}}>{opt}</button>)}</div>);
}

  return(<div onClick={onClick} style={{background:'white',border:'1px solid var(--g200)',borderRadius:10,padding:compact?10:12,cursor:'pointer',transition:'all .15s',borderLeft:`3px solid ${cc.d}`}} onMouseEnter={e=>{e.currentTarget.style.boxShadow='var(--sh)';e.currentTarget.style.borderColor=cc.d}} onMouseLeave={e=>{e.currentTarget.style.boxShadow='none';e.currentTarget.style.borderColor='var(--g200)';e.currentTarget.style.borderLeftColor=cc.d}}>

// ─── Stage editor ───
function StageModal({stages,open,onClose,onSave,journeyId}){
  const[list,setList]=useState(stages||[]);
  useEffect(()=>{setList(stages||[])},[stages]);
  const add=()=>setList([...list,{id:uid(),journey_id:journeyId,stage_name:'',stage_goal:'',position:list.length+1}]);
  const rm=(i)=>setList(list.filter((_,idx)=>idx!==i));
  const up=(i,f,v)=>{const n=[...list];n[i]={...n[i],[f]:v};setList(n)};
  const mv=(i,dir)=>{const j=i+dir;if(j<0||j>=list.length)return;const n=[...list];[n[i],n[j]]=[n[j],n[i]];n.forEach((s,idx)=>s.position=idx+1);setList(n)};
  return(<Modal open={open} onClose={onClose} title="Edit stages" width={680}>
    <Tip>Stages define the phases of your customer journey. Reorder them to match your narrative. Each touchpoint belongs to exactly one stage.</Tip>
    <div style={{display:'flex',flexDirection:'column',gap:6}}>
      {list.map((s,i)=>(<div key={s.id||i} style={{display:'flex',gap:8,alignItems:'center',padding:8,background:'var(--g25)',borderRadius:8,border:'1px solid var(--g100)'}}><span style={{fontWeight:700,fontSize:12,color:'var(--g400)',width:20,textAlign:'center'}}>{i+1}</span><input style={{...inpS,flex:1}} value={s.stage_name} onChange={e=>up(i,'stage_name',e.target.value)} placeholder="Stage name"/><input style={{...inpS,flex:1.5}} value={s.stage_goal||''} onChange={e=>up(i,'stage_goal',e.target.value)} placeholder="What does success look like?"/><button onClick={()=>mv(i,-1)} style={{background:'var(--g100)',borderRadius:6,width:26,height:26,fontSize:13}}>↑</button><button onClick={()=>mv(i,1)} style={{background:'var(--g100)',borderRadius:6,width:26,height:26,fontSize:13}}>↓</button><button onClick={()=>rm(i)} style={{background:'#FFC9A6',borderRadius:6,width:26,height:26,fontSize:13,color:'#7A250C'}}>×</button></div>))}
    </div>
    <button onClick={add} style={{marginTop:10,padding:'8px 16px',borderRadius:8,background:'var(--g50)',border:'1.5px dashed var(--g300)',color:'var(--g600)',fontWeight:600,width:'100%'}}>+ Add stage</button>
    <div style={{display:'flex',justifyContent:'flex-end',gap:8,marginTop:16,paddingTop:14,borderTop:'1px solid var(--g100)'}}><button onClick={onClose} style={{padding:'8px 20px',borderRadius:8,background:'var(--g50)',color:'var(--g600)'}}>Cancel</button><button onClick={()=>{onSave(list);onClose()}} style={{padding:'8px 20px',borderRadius:8,background:'var(--bk)',color:'white',fontWeight:600}}>Save stages</button></div>
  </Modal>);
}

// ─── Import modal ───
function ImportModal({open,onClose,onImport}){
  const[tab,setTab]=useState('notion');
  const[raw,setRaw]=useState('');
  const[name,setName]=useState('');
  const[err,setErr]=useState('');
  const[preview,setPreview]=useState(null);

  const tryParse=()=>{
    setErr('');setPreview(null);
    try{
      let result;
      if(tab==='csv') result=parseCSV(raw);
      else{
        try{result=parseNotionJSON(raw)}catch(e){
          if(e.message==='NOT_NOTION') result=parseGenericJSON(raw);
          else throw e;
        }
      }
      setPreview(result);
    }catch(e){setErr(e.message)}
  };

  const doImport=()=>{
    if(!preview)return;
    onImport(name||'Imported journey',preview);
    setRaw('');setPreview(null);setName('');onClose();
  };

  return(<Modal open={open} onClose={onClose} title="Import a journey" width={720}>
    <Tip icon="📥"><b>Import from Notion or CSV.</b> Paste data from your Notion database or a CSV export. The tool will auto-detect the format and map fields to the journey model.</Tip>

    {/* Notion-specific tip */}
    <div className="tip" style={{background:'#D5C8FF33',borderColor:'#BFA6EA',color:'#461068'}}>
      <span className="ico">🔮</span>
      <div>
        <b>Easiest way to import from Notion:</b> Ask Claude — <i>"Import the Notion database at [paste your Notion URL] into my journey tool"</i>. Claude will fetch the data, transform it, and give you the JSON to paste here.
      </div>
    </div>

    <div style={{display:'flex',gap:0,marginBottom:16,borderBottom:'2px solid var(--g100)'}}>
      {[{k:'notion',l:'Notion / JSON'},{k:'csv',l:'CSV'}].map(v=><button key={v.k} onClick={()=>{setTab(v.k);setErr('');setPreview(null)}} style={{padding:'9px 18px',fontSize:13,fontWeight:600,background:'transparent',color:tab===v.k?'var(--bk)':'var(--g500)',borderBottom:tab===v.k?'2px solid var(--bk)':'2px solid transparent',marginBottom:-2}}>{v.l}</button>)}
    </div>

    <Field label="Journey name" required hint="Give this imported journey a name">
      <input style={inpS} value={name} onChange={e=>setName(e.target.value)} placeholder="e.g. Cashback — Q2 2026"/>
    </Field>

    <Field label={tab==='csv'?'Paste CSV data':'Paste JSON data'} required hint={tab==='csv'?'First row should be column headers. Expected columns: Touchpoint, Phase, Channel, Status, Owner, etc.':'Paste the JSON array from Claude, or a Notion database export. Expected: [{Touchpoint, Phase, Channel, Status, ...}]'}>
      <textarea style={{...inpS,minHeight:180,resize:'vertical',fontFamily:'monospace',fontSize:12}} value={raw} onChange={e=>{setRaw(e.target.value);setErr('');setPreview(null)}} placeholder={tab==='csv'?'Touchpoint,Phase,Channel,Status,Owner\n"Landing page update",Acquisition,Website/SEO,To do,Romuald\n...':'[\n  {"Touchpoint": "Landing page", "Phase": "Acquisition", "Channel": "[\\\"Website/SEO\\\"]", "Status": "To do", ...},\n  ...\n]'}/>
    </Field>

    {err&&<div style={{padding:'8px 12px',background:'#FFC9A6',borderRadius:8,color:'#7A250C',fontSize:13,marginBottom:12}}>Error: {err}</div>}

    {!preview&&<button onClick={tryParse} disabled={!raw.trim()} style={{padding:'8px 20px',borderRadius:8,background:raw.trim()?'var(--bk)':'var(--g200)',color:raw.trim()?'white':'var(--g400)',fontWeight:600,marginBottom:16}}>Preview import</button>}

    {preview&&(<div className="fade-in">
      <div style={{padding:12,background:'#C8FFEC',borderRadius:10,marginBottom:16,display:'flex',gap:12,alignItems:'center'}}>
        <span style={{fontSize:20}}>✅</span>
        <div>
          <div style={{fontWeight:700,color:'#0D5563'}}>Parsed successfully</div>
          <div style={{fontSize:13,color:'#0D5563'}}>{preview.stages.length} stages · {preview.touchpoints.length} touchpoints · Source: {preview.source}</div>
        </div>
      </div>
      <div style={{maxHeight:200,overflow:'auto',border:'1px solid var(--g200)',borderRadius:8,marginBottom:16}}>
        <table style={{width:'100%',borderCollapse:'collapse',fontSize:12}}>
          <thead><tr style={{background:'var(--g50)'}}><th style={{padding:'6px 10px',textAlign:'left',fontWeight:700}}>Touchpoint</th><th style={{padding:'6px 10px',textAlign:'left',fontWeight:700}}>Stage</th><th style={{padding:'6px 10px',textAlign:'left',fontWeight:700}}>Channel</th><th style={{padding:'6px 10px',textAlign:'left',fontWeight:700}}>Status</th></tr></thead>
          <tbody>{preview.touchpoints.map((tp,i)=>{const st=preview.stages.find(s=>s.id===tp.stage_id);return<tr key={i} style={{borderTop:'1px solid var(--g100)'}}><td style={{padding:'5px 10px'}}>{tp.touchpoint_name}</td><td style={{padding:'5px 10px'}}>{st?.stage_name||'—'}</td><td style={{padding:'5px 10px'}}><ChannelBadge channel={tp.channel}/></td><td style={{padding:'5px 10px'}}><StatusBadge status={tp.status}/></td></tr>})}</tbody>
        </table>
      </div>
      <div style={{display:'flex',justifyContent:'flex-end',gap:8}}>
        <button onClick={()=>setPreview(null)} style={{padding:'8px 20px',borderRadius:8,background:'var(--g50)',color:'var(--g600)'}}>Back</button>
        <button onClick={doImport} disabled={!name.trim()} style={{padding:'8px 20px',borderRadius:8,background:name.trim()?'var(--bk)':'var(--g200)',color:name.trim()?'white':'var(--g400)',fontWeight:600}}>Import journey</button>
      </div>
    </div>)}
  </Modal>);
}

  const sorted=useMemo(()=>[...touchpoints].filter(tp=>tp.go_live_date).sort((a,b)=>new Date(a.go_live_date)-new Date(b.go_live_date)),[touchpoints]);
  let lastDate='';
  return(<div style={{maxWidth:780}}>
    {sorted.length>0&&<Tip icon="📅">Touchpoints are ordered by go-live date. Click any card to view or edit its details.</Tip>}
    {sorted.map(tp=>{const d=tp.go_live_date;const showDate=d!==lastDate;lastDate=d;const cc=CH_COLORS[tp.channel]||{d:'#8F8F8F'};return(<div key={tp.id} style={{display:'flex',gap:14,marginBottom:2}}><div style={{width:80,textAlign:'right',paddingTop:12,fontSize:13,fontWeight:600,color:showDate?'var(--bk)':'transparent'}}>{fmtD(d)}</div><div style={{display:'flex',flexDirection:'column',alignItems:'center',width:18}}><div style={{width:10,height:10,borderRadius:'50%',background:cc.d,marginTop:14,zIndex:1}}/><div style={{width:2,flex:1,background:'var(--g200)',marginTop:-2}}/></div><div style={{flex:1,paddingBottom:6}}><TPCard tp={tp} onClick={()=>onClickTP(tp)} compact/></div></div>)})}
    {sorted.length===0&&<Tip warn>No touchpoints have go-live dates yet. Add dates to your touchpoints to see the timeline view.</Tip>}
  </div>);
}

// ─── Gaps view ───
function GapsView({stages,touchpoints}){
  const usedCh=useMemo(()=>{const s=new Set(touchpoints.map(tp=>tp.channel));return[...new Set([...CHANNELS,...Object.keys(CH_COLORS)])].filter(c=>s.has(c))},[touchpoints]);
  const gaps=useMemo(()=>{const r=[];stages.forEach(stage=>usedCh.forEach(ch=>{if(!touchpoints.some(tp=>tp.stage_id===stage.id&&tp.channel===ch))r.push({stage,channel:ch})}));return r},[stages,touchpoints,usedCh]);
  const coverage=stages.map(stage=>({stage,count:touchpoints.filter(tp=>tp.stage_id===stage.id).length}));
  return(<div>
    <Tip icon="🔍"><b>Gaps analysis</b> shows which stage × channel combinations have no touchpoint yet. Some gaps are intentional — not every channel needs to be active at every stage. Use this to spot unintentional blind spots in your plan.</Tip>
    <h3 style={{fontSize:15,fontWeight:700,marginBottom:12}}>Coverage by stage</h3>
    <div style={{display:'flex',gap:10,flexWrap:'wrap',marginBottom:24}}>
      {coverage.map(({stage,count})=><div key={stage.id} style={{padding:'14px 18px',borderRadius:12,border:'1px solid var(--g200)',background:count===0?'#FFC9A6':count<3?'#FAFFA4':'#C8FFEC',minWidth:130,textAlign:'center'}}><div style={{fontSize:22,fontWeight:800}}>{count}</div><div style={{fontSize:12,fontWeight:600,color:'var(--g600)',marginTop:2}}>{stage.stage_name}</div></div>)}
    </div>
    <h3 style={{fontSize:15,fontWeight:700,marginBottom:12}}>Channel × stage gaps ({gaps.length})</h3>
    {gaps.length===0?<div style={{padding:20,background:'#C8FFEC',borderRadius:12,color:'#0D5563',fontWeight:600,textAlign:'center'}}>Full coverage — no gaps across active channels and stages.</div>:
    <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fill,minmax(260px,1fr))',gap:6}}>{gaps.map((g,i)=>{const cc=CH_COLORS[g.channel]||{d:'#8F8F8F'};return<div key={i} style={{padding:'8px 12px',borderRadius:8,border:'1.5px dashed var(--g300)',background:'var(--g25)',display:'flex',alignItems:'center',gap:8,fontSize:13}}><span style={{width:7,height:7,borderRadius:'50%',background:cc.d,flexShrink:0}}/><span><strong>{g.channel}</strong> in <strong>{g.stage.stage_name}</strong></span></div>})}</div>}
  </div>);
}

// ─── Journey map view (visual stage-column layout) ───
// Inline date editor — click TBC dates to set them with date pickers
function JMDateEditor({tp,onUpdate}){
  const[editing,setEditing]=useState(false);
  const[startVal,setStartVal]=useState('');
  const[endVal,setEndVal]=useState('');
  const open=()=>{setStartVal(tp.go_live_date||'');setEndVal(tp.end_date||'');setEditing(true)};
  const save=(e)=>{e.stopPropagation();onUpdate({...tp,go_live_date:startVal||'',end_date:endVal||''});setEditing(false)};
  const cancel=(e)=>{e.stopPropagation();setEditing(false)};
  if(editing){
    return(<div onClick={e=>e.stopPropagation()} style={{display:'flex',gap:3,alignItems:'center',flexWrap:'wrap',padding:'3px 0'}}>
      <input type="date" value={startVal} onChange={e=>setStartVal(e.target.value)} style={{fontSize:10,fontFamily:'var(--font)',fontWeight:600,padding:'2px 4px',border:'1.5px solid var(--blue)',borderRadius:4,width:110,background:'var(--blue-l)',color:'var(--blue-d)'}}/>
      <span style={{fontSize:10,color:'var(--g400)'}}>to</span>
      <input type="date" value={endVal} onChange={e=>setEndVal(e.target.value)} style={{fontSize:10,fontFamily:'var(--font)',fontWeight:600,padding:'2px 4px',border:'1.5px solid var(--blue)',borderRadius:4,width:110,background:'var(--blue-l)',color:'var(--blue-d)'}}/>
      <button onClick={save} style={{fontSize:10,fontWeight:700,padding:'2px 8px',borderRadius:4,border:'none',background:'var(--bk)',color:'white',cursor:'pointer',fontFamily:'var(--font)'}}>OK</button>
      <button onClick={cancel} style={{fontSize:10,fontWeight:600,padding:'2px 6px',borderRadius:4,border:'1px solid var(--g300)',background:'white',color:'var(--g500)',cursor:'pointer',fontFamily:'var(--font)'}}>✕</button>
    </div>);
  }
  const hasDate=tp.go_live_date;
  return(<span onClick={e=>{e.stopPropagation();open()}} title="Click to set date" style={{fontSize:10,fontWeight:600,padding:'1px 6px',borderRadius:4,background:hasDate?'var(--g50)':'var(--blue-l)',color:hasDate?'var(--g600)':'var(--blue-d)',fontStyle:hasDate?'normal':'italic',cursor:'pointer',border:hasDate?'1px solid transparent':'1px dashed var(--blue)',transition:'all .12s'}}>
    {hasDate?fmtD(tp.go_live_date)+(tp.end_date&&tp.end_date!==tp.go_live_date?' – '+fmtD(tp.end_date):''):'TBC (click to set)'}
  </span>);
}

// Inline status toggle — click to cycle through statuses
function JMStatusToggle({tp,onUpdate}){
  const CYCLE=['not_started','planned','in_progress','done'];
  const toggle=(e)=>{e.stopPropagation();const i=CYCLE.indexOf(tp.status);const next=CYCLE[(i+1)%CYCLE.length];onUpdate({...tp,status:next})};

  const isDone=tp.status==='done'||tp.status==='in_progress';

    <span style={{width:5,height:5,borderRadius:5,background:isDone?'#34A853':'#71A5E0',display:'inline-block'}}/>
    {s.l}
  </span>);
}

function JourneyMapView({journey,stages,touchpoints,onClickTP,onUpdateTP}){
  const [audFilter,setAudFilter]=useState('all');
  const [hoveredTp,setHoveredTp]=useState(null);
  const [changeCount,setChangeCount]=useState(0);

  // Persist inline edits through the main data model
  const updateTP=(updated)=>{if(onUpdateTP){onUpdateTP(updated);setChangeCount(c=>c+1)}};

  // Filter by audience
  const filtered=useMemo(()=>{
    if(audFilter==='all')return touchpoints;
    return touchpoints.filter(tp=>(tp.audience||[]).includes(audFilter));
  },[touchpoints,audFilter]);

  // Map status to confirmed/tbc for visual display
  const isConfirmed=(tp)=>tp.status==='done'||tp.status==='in_progress'||tp.validated==='validated';

  // Build stage data with channel grouping
  const stageData=useMemo(()=>stages.map((stage,i)=>{
    const tps=filtered.filter(tp=>tp.stage_id===stage.id);
    const byChannel={};
    tps.forEach(t=>{(byChannel[t.channel]=byChannel[t.channel]||[]).push(t)});
    const conf=tps.filter(t=>isConfirmed(t)).length;
    return{...stage,byChannel,total:tps.length,confirmed:conf,tbc:tps.length-conf,colorIdx:i};
  }),[filtered,stages]);

  // Audience counts from full touchpoints (not filtered)
  const prospectCount=touchpoints.filter(t=>(t.audience||[]).includes('prospect')).length;
  const clientCount=touchpoints.filter(t=>(t.audience||[]).includes('client')).length;
  const channelsActive=[...new Set(touchpoints.map(t=>t.channel))].length;
  const confirmedCount=touchpoints.filter(t=>isConfirmed(t)).length;
  const readinessPct=touchpoints.length>0?Math.round((confirmedCount/touchpoints.length)*100):0;

  // Timeline helpers
  const datedTPs=filtered.filter(tp=>tp.go_live_date);
  const allDates=[...datedTPs.map(tp=>new Date(tp.go_live_date+'T00:00:00')),...datedTPs.filter(tp=>tp.end_date).map(tp=>new Date(tp.end_date+'T00:00:00'))].filter(d=>!isNaN(d));
  const minDate=allDates.length>0?new Date(Math.min(...allDates)):new Date();
  const maxDate=allDates.length>0?new Date(Math.max(...allDates)):new Date();
  const tlStart=new Date(minDate);tlStart.setDate(tlStart.getDate()-15);
  const tlEnd=new Date(maxDate);tlEnd.setDate(tlEnd.getDate()+15);
  const totalDays=Math.max(Math.round((tlEnd-tlStart)/86400000),30);
  const pct=(d)=>{if(!d)return null;const diff=Math.round((new Date(d+'T00:00:00')-tlStart)/86400000);return Math.max(0,Math.min(100,(diff/totalDays)*100))};

  // Generate month labels for timeline
  const months=useMemo(()=>{
    const ms=[];let cur=new Date(tlStart.getFullYear(),tlStart.getMonth(),1);
    while(cur<=tlEnd){ms.push({label:cur.toLocaleDateString('en-GB',{month:'short'}),year:cur.getFullYear(),dayOff:Math.max(0,Math.round((cur-tlStart)/86400000))});cur=new Date(cur.getFullYear(),cur.getMonth()+1,1)}
    return ms;
  },[tlStart,tlEnd,totalDays]);

  // Channel order for Gantt
  const channelOrder=useMemo(()=>{
    const used=[...new Set(filtered.map(t=>t.channel))];
    return CHANNELS.filter(c=>used.includes(c)).concat(used.filter(c=>!CHANNELS.includes(c)));
  },[filtered]);

  const stageColor=(tp)=>{const idx=stages.findIndex(s=>s.id===tp.stage_id);return STAGE_C[idx%STAGE_C.length]||'#8F8F8F'};

  return(<div className="fade-in">
    {/* Audience filter + summary strip */}
    <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',flexWrap:'wrap',gap:12,marginBottom:14}}>
      <div style={{display:'flex',gap:6}}>
        {[{key:'all',label:'All touchpoints',count:touchpoints.length},{key:'prospect',label:'Prospect journey',count:prospectCount},{key:'client',label:'Client journey',count:clientCount}].map(f=>(
          <button key={f.key} onClick={()=>setAudFilter(f.key)} style={{padding:'5px 14px',borderRadius:20,fontSize:12,fontWeight:700,fontFamily:'var(--font)',cursor:'pointer',transition:'all .15s',border:audFilter===f.key?'2px solid var(--bk)':'1.5px solid var(--g200)',background:audFilter===f.key?'var(--bk)':'white',color:audFilter===f.key?'white':'var(--g600)'}}>{f.label} ({f.count})</button>
        ))}
      </div>
      <div style={{display:'flex',gap:12,fontSize:12,color:'var(--g500)',alignItems:'center'}}>
        <span><strong style={{color:'var(--bk)'}}>{filtered.length}</strong> touchpoints</span>
        <span><strong style={{color:'var(--bk)'}}>{channelsActive}</strong> channels</span>
        <span><strong style={{color:'var(--bk)'}}>{stages.length}</strong> stages</span>
      </div>
    </div>

    {/* Unsaved edits indicator */}
    {changeCount>0&&<div style={{display:'inline-flex',alignItems:'center',gap:6,padding:'5px 12px',borderRadius:8,marginBottom:10,background:'var(--orange-l)',border:'1px solid #F5F596',fontSize:11,fontWeight:600,color:'var(--orange-d)'}}>
      <span style={{width:6,height:6,borderRadius:6,background:'var(--orange)'}}/>
      {changeCount} inline edit{changeCount>1?'s':''} saved
      <span style={{color:'var(--orange)',fontWeight:500}}>— click TBC dates to update</span>
    </div>}

    {/* Stage columns */}
    <div style={{overflowX:'auto',paddingBottom:16}}>
      {/* Stage headers */}
      <div style={{display:'flex',gap:6,marginBottom:10,minWidth:stages.length*220}}>
        {stageData.map((s,i)=>{
          const c=STAGE_C[i%STAGE_C.length];
          return(<React.Fragment key={s.id}>
            <div style={{flex:1,minWidth:200}}>
              <div style={{background:c+'15',borderRadius:10,padding:'10px 14px',borderLeft:`3px solid ${c}`}}>
                <div style={{fontSize:13,fontWeight:800,color:c,display:'flex',alignItems:'center',gap:5}}>
                  <span style={{width:8,height:8,borderRadius:'50%',background:c}}/> {s.stage_name}
                </div>
                <div style={{fontSize:11,color:c,opacity:0.7,marginTop:2}}>
                  {s.total} touchpoint{s.total!==1?'s':''}
                </div>
                {s.stage_goal&&<div style={{fontSize:10,color:'var(--g500)',marginTop:3,lineHeight:1.3,fontStyle:'italic'}}>{s.stage_goal}</div>}
              </div>
            </div>
            {i<stageData.length-1&&<div style={{display:'flex',alignItems:'center',flexShrink:0,width:16,color:'var(--g300)',fontSize:16,fontWeight:300}}>›</div>}
          </React.Fragment>);
        })}
      </div>

      {/* Channel cards per stage */}
      <div style={{display:'flex',gap:6,alignItems:'flex-start',minWidth:stages.length*220}}>
        {stageData.map((stage,i)=>{
          return(<React.Fragment key={stage.id}>
            <div style={{flex:1,minWidth:200,display:'flex',flexDirection:'column',gap:6}}>
              {Object.entries(stage.byChannel).map(([ch,tps])=>{
                const cc=CH_COLORS[ch]||{bg:'#F5F5F5',t:'#616161',d:'#8F8F8F'};
                return(<div key={ch} style={{borderRadius:10,overflow:'hidden',border:`1px solid ${cc.d||'var(--g200)'}22`,background:'white'}}>
                  <div style={{background:cc.bg||'var(--g50)',padding:'6px 11px',display:'flex',alignItems:'center',gap:5,borderBottom:`1px solid ${cc.d||'var(--g200)'}22`}}>
                    <span style={{width:6,height:6,borderRadius:'50%',background:cc.d||'#8F8F8F',flexShrink:0}}/>
                    <span style={{fontSize:11,fontWeight:700,color:cc.t||'var(--g600)',letterSpacing:'0.2px'}}>{ch}</span>
                  </div>
                  <div style={{padding:4,display:'flex',flexDirection:'column',gap:3}}>
                    {tps.map(tp=>{
                      const conf=isConfirmed(tp);
                      const isHov=hoveredTp===tp.id;
                      return(<div key={tp.id}
                        onMouseEnter={()=>setHoveredTp(tp.id)}
                        onMouseLeave={()=>setHoveredTp(null)}
                        style={{padding:'7px 9px',borderRadius:6,cursor:'default',border:'1px solid var(--g200)',background:isHov?'var(--g50)':'var(--g25)',transition:'background .12s'}}>
                        <div onClick={()=>onClickTP(tp)} style={{fontSize:12,fontWeight:600,lineHeight:1.3,color:'var(--bk)',marginBottom:4,cursor:'pointer'}}>{tp.touchpoint_name}</div>
                        <div style={{display:'flex',gap:4,flexWrap:'wrap',alignItems:'center'}}>
                          {(tp.audience||[]).map(a=><span key={a} style={{fontSize:10,fontWeight:700,padding:'1px 6px',borderRadius:4,background:a==='prospect'?'#D5C8FF':a==='client'?'#C6E6FB':'#FAFFA4',color:a==='prospect'?'#461068':a==='client'?'#093B75':'#705208'}}>{a}</span>)}
                          <JMDateEditor tp={tp} onUpdate={updateTP}/>
                        </div>
                        {(tp.market||[]).length>0&&<div style={{fontSize:10,color:'var(--g400)',marginTop:3}}>{(tp.market||[]).join(', ')}</div>}
                        {isHov&&(tp._objective||tp.message_angle)&&<div style={{marginTop:5,padding:'5px 8px',borderRadius:5,background:'var(--g50)',border:'1px solid var(--g100)',fontSize:11,color:'var(--g600)',lineHeight:1.35}}>

                      </div>);

            </div>
            {i<stageData.length-1&&<div style={{width:16,flexShrink:0}}/>}
          </React.Fragment>);
        })}
      </div>
    </div>

    {/* Timeline by channel (Gantt) */}
    {datedTPs.length>0&&<div style={{marginTop:16,padding:'16px 18px',borderRadius:10,background:'white',border:'1px solid var(--g200)'}}>
      <div style={{fontSize:11,fontWeight:700,color:'var(--g500)',textTransform:'uppercase',letterSpacing:'0.5px',marginBottom:12}}>Timeline by channel</div>

              </div>
            </div>
            <div style={{position:'relative',borderBottom:'1px solid var(--g100)',minHeight:rowH,paddingTop:6}}>
              {/* Month dividers */}
              {months.filter(m=>m.dayOff>0).map((m,mi)=><div key={mi} style={{position:'absolute',left:`${(m.dayOff/totalDays)*100}%`,top:0,bottom:0,borderLeft:'1px solid var(--g200)'}}/>)}
              {/* Dated bars */}
              {dated.map((tp,idx)=>{
                const left=pct(tp.go_live_date);
                const endP=pct(tp.end_date||tp.go_live_date);
                const barW=Math.max(endP-left+0.8,2.5);
                const sc=stageColor(tp);
                const conf=isConfirmed(tp);
                return(<div key={tp.id} onClick={()=>onClickTP(tp)} style={{position:'absolute',top:idx*28+4,left:`${left}%`,width:`${barW}%`,minWidth:90,height:24,borderRadius:5,background:sc+'18',border:`1.5px solid ${sc}`,display:'flex',alignItems:'center',gap:4,paddingLeft:6,paddingRight:4,overflow:'hidden',zIndex:2,cursor:'pointer'}}>
                  <span style={{width:6,height:6,borderRadius:6,flexShrink:0,background:sc}}/>
                  <span style={{fontSize:10,fontWeight:700,color:sc,whiteSpace:'nowrap',overflow:'hidden',textOverflow:'ellipsis',flex:1}}>{tp.touchpoint_name}</span>
                  <span style={{fontSize:9,fontWeight:600,color:sc,opacity:0.7,whiteSpace:'nowrap',flexShrink:0}}>{fmtD(tp.go_live_date)}</span>
                </div>);
              })}
              {/* Undated TBC chips */}
              {undated.length>0&&<div style={{position:'absolute',bottom:4,left:4,right:4,display:'flex',gap:4,flexWrap:'wrap'}}>
                {undated.map(tp=><span key={tp.id} onClick={()=>onClickTP(tp)} style={{fontSize:10,fontWeight:600,padding:'2px 8px',borderRadius:4,background:'var(--g50)',border:'1px dashed var(--g300)',color:'var(--blue)',fontStyle:'italic',cursor:'pointer'}}>{tp.touchpoint_name} — TBC</span>)}
              </div>}
            </div>
          </React.Fragment>);
        })}
      </div>

      {/* Legend */}
      <div style={{display:'flex',gap:16,marginTop:12,alignItems:'center',flexWrap:'wrap'}}>
        {stages.map((s,i)=><div key={s.id} style={{display:'flex',alignItems:'center',gap:3}}>
          <div style={{width:8,height:8,borderRadius:2,background:STAGE_C[i%STAGE_C.length]+'25',border:`1px solid ${STAGE_C[i%STAGE_C.length]}`}}/>
          <span style={{fontSize:10,color:'var(--g500)',fontWeight:600}}>{s.stage_name}</span>
        </div>)}
      </div>
    </div>}

    {/* Summary cards */}
    <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fit, minmax(170px, 1fr))',gap:8,marginTop:12}}>
      {[{label:'Prospect journey',value:prospectCount,sub:`${prospectCount} touchpoints`,color:'#461068'},
        {label:'Client journey',value:clientCount,sub:`${clientCount} touchpoints`,color:'#093B75'},
        {label:'Channels active',value:channelsActive,sub:`across ${stages.length} stages`,color:'var(--g500)'},
        {label:'Dated',value:datedTPs.length,sub:`${touchpoints.length-datedTPs.length} TBC`,color:'var(--g500)'}
      ].map((c,i)=><div key={i} style={{padding:'11px 14px',borderRadius:10,background:'white',border:'1px solid var(--g200)'}}>
        <div style={{fontSize:11,fontWeight:700,textTransform:'uppercase',letterSpacing:'0.4px',color:c.color,marginBottom:3}}>{c.label}</div>
        <div style={{fontSize:20,fontWeight:800,color:'var(--bk)'}}>{c.value}</div>
        <div style={{fontSize:11,color:'var(--g500)'}}>{c.sub}</div>
      </div>)}
    </div>

    {/* Messaging & guardrails */}
    {(journey.messaging_angle||journey.guardrails)&&<div style={{display:'grid',gridTemplateColumns:journey.messaging_angle&&journey.guardrails?'1fr 1fr':'1fr',gap:8,marginTop:12}}>
      {journey.messaging_angle&&<div style={{padding:'11px 14px',borderRadius:10,background:'white',borderLeft:'3px solid var(--bk)'}}>
        <div style={{fontSize:10,fontWeight:700,color:'var(--g500)',textTransform:'uppercase',letterSpacing:'0.4px',marginBottom:2}}>Messaging angle</div>
        <div style={{fontSize:13,color:'var(--bk)',fontWeight:600}}>{journey.messaging_angle}</div>
      </div>}
      {journey.guardrails&&<div style={{padding:'11px 14px',borderRadius:10,background:'var(--orange-l)',borderLeft:'3px solid var(--orange)'}}>
        <div style={{fontSize:10,fontWeight:700,color:'var(--orange-d)',textTransform:'uppercase',letterSpacing:'0.4px',marginBottom:2}}>Guardrails</div>
        <div style={{fontSize:13,color:'var(--orange-d)',fontWeight:600}}>{journey.guardrails}</div>
      </div>}
    </div>}

    {/* Footer hint */}
    <div style={{textAlign:'center',color:'var(--g400)',fontSize:11,marginTop:12}}>
      Click touchpoint name to open full editor · Click TBC dates to edit inline · Hover for objectives &amp; key messages
    </div>
  </div>);
}

            <p style={{fontSize:13,color:'var(--g500)',lineHeight:1.5,marginBottom:12}}>{j.template_description}</p>
            <div style={{display:'flex',gap:12,fontSize:12,color:'var(--g500)',marginBottom:12}}><span><strong>{tpCount}</strong> touchpoints</span><span><strong>{stageCount}</strong> stages</span><span><strong>{channels.length}</strong> channels</span></div>
            <div style={{display:'flex',flexWrap:'wrap',gap:4,marginBottom:8}}>{channels.slice(0,5).map(ch=><ChannelBadge key={ch} channel={ch}/>)}{channels.length>5&&<Pill label={`+${channels.length-5}`} bg="var(--g50)" color="var(--g500)" small/>}</div>

            <button onClick={()=>onPreview(j)} style={{flex:1,padding:'8px 0',borderRadius:8,background:'white',border:'1px solid var(--g200)',color:'var(--g600)',fontWeight:600}}>Preview</button>

// ─── Main App ───
function App(){
  const[data,setData]=useState(()=>{try{const s=localStorage.getItem('jap_v3');if(s){const p=JSON.parse(s);p.library=createLibrary();return p}}catch(e){}return initData()});
  useEffect(()=>{try{localStorage.setItem('jap_v3',JSON.stringify(data))}catch(e){}},[data]);

  const[activeJId,setActiveJId]=useState(data.journeys[0]?.id||null);
  const[page,setPage]=useState(data.journeys.length>0?'journey':'home');
  const[view,setView]=useState('journey_map');
  const[filters,setFilters]=useState({channels:[],audiences:[],markets:[]});
  const[tpModal,setTpModal]=useState({open:false,tp:null});
  const[jModal,setJModal]=useState({open:false,journey:null});
  const[stageModal,setStageModal]=useState(false);
  const[previewModal,setPreviewModal]=useState({open:false,journey:null});
  const[importModal,setImportModal]=useState(false);

  const activeJ=data.journeys.find(j=>j.id===activeJId);
  const jStages=useMemo(()=>data.stages.filter(s=>s.journey_id===activeJId).sort((a,b)=>a.position-b.position),[data.stages,activeJId]);
  const allTPs=useMemo(()=>data.touchpoints.filter(tp=>tp.journey_id===activeJId&&tp.validated!=='discarded'),[data.touchpoints,activeJId]);
  const filteredTPs=useMemo(()=>{let t=allTPs;if(filters.channels.length)t=t.filter(tp=>filters.channels.includes(tp.channel));if(filters.audiences.length)t=t.filter(tp=>tp.audience?.some(a=>filters.audiences.includes(a)));return t},[allTPs,filters]);

  const saveTP=(tp)=>setData(p=>{const i=p.touchpoints.findIndex(t=>t.id===tp.id);if(i>=0){const n=[...p.touchpoints];n[i]=tp;return{...p,touchpoints:n}}return{...p,touchpoints:[...p.touchpoints,{...tp,id:uid(),journey_id:activeJId}]}});
  const deleteTP=(id)=>setData(p=>({...p,touchpoints:p.touchpoints.filter(tp=>tp.id!==id)}));
  const saveJ=(j)=>{setData(p=>{const i=p.journeys.findIndex(jj=>jj.id===j.id);if(i>=0){const n=[...p.journeys];n[i]=j;return{...p,journeys:n}}const nJ={...j,id:uid()};const nS=DEFAULT_STAGES.map(s=>({...s,id:uid(),journey_id:nJ.id}));setActiveJId(nJ.id);setPage('journey');return{...p,journeys:[...p.journeys,nJ],stages:[...p.stages,...nS]}})};
  const deleteJ=(id)=>{setData(p=>({...p,journeys:p.journeys.filter(j=>j.id!==id),stages:p.stages.filter(s=>s.journey_id!==id),touchpoints:p.touchpoints.filter(tp=>tp.journey_id!==id)}));const rem=data.journeys.filter(j=>j.id!==id);if(rem.length){setActiveJId(rem[0].id);setPage('journey')}else{setActiveJId(null);setPage('home')}};
  const saveStages=(list)=>setData(p=>({...p,stages:[...p.stages.filter(s=>s.journey_id!==activeJId),...list]}));

  const cloneFromLib=(libJ)=>{
    const nJId=uid();const libS=data.library.stages.filter(s=>s.journey_id===libJ.id).sort((a,b)=>a.position-b.position);const libTP=data.library.touchpoints.filter(tp=>tp.journey_id===libJ.id);const sMap={};
    const nS=libS.map(s=>{const nId=uid();sMap[s.id]=nId;return{...clone(s),id:nId,journey_id:nJId}});
    const nTP=libTP.map(tp=>({...clone(tp),id:uid(),journey_id:nJId,stage_id:sMap[tp.stage_id]||tp.stage_id,status:'not_started',validated:'tbd',go_live_date:'',end_date:'',kick_off_date:'',eta_deliverables:''}));
    const nJ={...clone(libJ),id:nJId,journey_name:libJ.journey_name+' (copy)',status:'draft',is_template:false};
    setData(p=>({...p,journeys:[...p.journeys,nJ],stages:[...p.stages,...nS],touchpoints:[...p.touchpoints,...nTP]}));
    setActiveJId(nJId);setPage('journey');setView('matrix');
  };

  const importJourney=(name,result)=>{
    const nJId=uid();
    const nS=result.stages.map(s=>({...s,id:s.id||uid(),journey_id:nJId}));
    const sMap={};result.stages.forEach((s,i)=>sMap[s.id]=nS[i].id);
    const nTP=result.touchpoints.map(tp=>({...tp,id:uid(),journey_id:nJId,stage_id:sMap[tp.stage_id]||tp.stage_id}));
    const nJ={id:nJId,journey_name:name,goal_type:[],persona_type:'',segment:[],markets:['Global'],status:'draft',start_date:'',end_date:'',owner:'',messaging_angle:'',guardrails:'',eligibility_notes:''};
    setData(p=>({...p,journeys:[...p.journeys,nJ],stages:[...p.stages,...nS],touchpoints:[...p.touchpoints,...nTP]}));
    setActiveJId(nJId);setPage('journey');setView('matrix');
  };

  const openAddTP=(stageId,channel)=>setTpModal({open:true,tp:{touchpoint_name:'',stage_id:stageId,channel,touchpoint_type:'',owner:'',audience:[],market:activeJ?.markets||[],status:'not_started',validated:'tbd',go_live_date:'',team:[],market_override:false}});

  const exportCSV=()=>{
    const sMap={};jStages.forEach(s=>sMap[s.id]=s.stage_name);
    const h=['Touchpoint','Stage','Channel','Type','Audience','Market','Owner','Status','Go-live','End','CTA','Message angle'];
    const rows=allTPs.map(tp=>[tp.touchpoint_name,sMap[tp.stage_id]||'',tp.channel,tp.touchpoint_type,(tp.audience||[]).join('; '),(tp.market||[]).join('; '),tp.owner,tp.status,tp.go_live_date,tp.end_date||'',tp.cta_label||'',tp.message_angle||'']);
    const csv=[h,...rows].map(r=>r.map(c=>`"${(c||'').replace(/"/g,'""')}"`).join(',')).join('\n');
    const a=document.createElement('a');a.href=URL.createObjectURL(new Blob([csv],{type:'text/csv'}));a.download=`${activeJ?.journey_name||'journey'}.csv`;a.click();
  };

  const exportPDF=()=>{
    const el=document.getElementById('pdf-capture');
    if(!el)return;
    const fileName=`${activeJ?.journey_name||'journey'}.pdf`;
    const opt={
      margin:[10,8,10,8],
      filename:fileName,
      image:{type:'jpeg',quality:0.95},
      html2canvas:{scale:2,useCORS:true,scrollX:0,scrollY:0,windowWidth:el.scrollWidth+40},
      jsPDF:{unit:'mm',format:'a3',orientation:'landscape'},
      pagebreak:{mode:['avoid-all','css','legacy']}
    };
    // Briefly show a generating indicator
    const btn=document.activeElement;if(btn)btn.textContent='Generating…';
    html2pdf().set(opt).from(el).save().then(()=>{if(btn)btn.textContent='Export PDF'}).catch(()=>{if(btn)btn.textContent='Export PDF'});
  };

  const views=[{k:'matrix',l:'Action plan'},{k:'journey_map',l:'Journey map'},{k:'timeline',l:'Timeline'},{k:'gaps',l:'Gaps'}];

  return(<div style={{minHeight:'100vh',background:'var(--g25)'}}>
    <div style={{borderBottom:'1px solid var(--g200)',padding:'10px 20px',display:'flex',justifyContent:'space-between',alignItems:'center',background:'white',position:'sticky',top:0,zIndex:100}}>
      <div style={{display:'flex',alignItems:'center',gap:12}}>
        <button onClick={()=>{if(data.journeys.length)setPage('journey');else setPage('home')}} style={{fontWeight:800,fontSize:15,background:'none',color:'var(--bk)',padding:0}}>Journey action plan</button>
        <div style={{width:1,height:20,background:'var(--g200)'}}/>
        <button onClick={()=>setPage('library')} style={{padding:'5px 12px',borderRadius:6,fontSize:13,fontWeight:600,background:page==='library'?'var(--g100)':'transparent',color:page==='library'?'var(--bk)':'var(--g500)'}}>Past campaigns</button>
        {data.journeys.length>0&&<div style={{display:'flex',gap:3,background:'var(--g50)',borderRadius:8,padding:3}}>
          {data.journeys.map(j=><button key={j.id} onClick={()=>{setActiveJId(j.id);setPage('journey')}} style={{padding:'4px 12px',borderRadius:5,fontSize:12,fontWeight:600,background:page==='journey'&&j.id===activeJId?'white':'transparent',color:page==='journey'&&j.id===activeJId?'var(--bk)':'var(--g500)',boxShadow:page==='journey'&&j.id===activeJId?'0 1px 3px rgba(0,0,0,.1)':'none',maxWidth:180,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{j.journey_name}</button>)}
        </div>}
        <button onClick={()=>setJModal({open:true,journey:{}})} style={{padding:'4px 10px',borderRadius:6,background:'transparent',color:'var(--g400)',border:'1.5px dashed var(--g300)',fontSize:12,fontWeight:600}}>+ New</button>
        <button onClick={()=>setImportModal(true)} style={{padding:'4px 10px',borderRadius:6,background:'transparent',color:'var(--g400)',border:'1.5px dashed var(--g300)',fontSize:12,fontWeight:600}}>📥 Import</button>
      </div>
      <div style={{display:'flex',gap:6,alignItems:'center'}}>
        {page==='journey'&&activeJ&&<>
          <button onClick={()=>setTpModal({open:true,tp:{touchpoint_name:'',stage_id:jStages[0]?.id||'',channel:'',touchpoint_type:'',owner:'',audience:[],market:activeJ?.markets||[],status:'not_started',validated:'tbd',go_live_date:'',team:[],market_override:false}})} style={{padding:'5px 12px',borderRadius:6,background:'var(--bk)',color:'white',fontSize:12,fontWeight:600}}>+ New touchpoint</button>
          <button onClick={exportPDF} style={{padding:'5px 12px',borderRadius:6,background:'var(--g50)',border:'1px solid var(--g200)',fontSize:12,fontWeight:600,color:'var(--g600)'}}>Export PDF</button>
          <button onClick={exportCSV} style={{padding:'5px 12px',borderRadius:6,background:'var(--g50)',border:'1px solid var(--g200)',fontSize:12,fontWeight:600,color:'var(--g600)'}}>Export CSV</button>
          <button onClick={()=>deleteJ(activeJId)} style={{padding:'5px 12px',borderRadius:6,background:'#FFC9A6',border:'1px solid #FFB590',fontSize:12,fontWeight:600,color:'#7A250C'}}>Delete</button>
        </>}
      </div>
    </div>

    <div style={{padding:'20px 20px 60px',maxWidth:1500,margin:'0 auto'}}>
      {page==='home'&&<HomePage onNew={()=>setJModal({open:true,journey:{}})} onGoLibrary={()=>setPage('library')} onImport={()=>setImportModal(true)}/>}
      {page==='library'&&<LibraryPage library={data.library} onClone={cloneFromLib} onPreview={j=>setPreviewModal({open:true,journey:j})}/>}
      {page==='journey'&&activeJ&&<div id="pdf-capture">
        <JourneyHeader journey={activeJ} stages={jStages} touchpoints={allTPs} onEdit={()=>setJModal({open:true,journey:activeJ})} onEditStages={()=>setStageModal(true)}/>
        <div className="no-print" style={{display:'flex',gap:0,marginBottom:14,borderBottom:'2px solid var(--g100)'}}>{views.map(v=><button key={v.k} onClick={()=>setView(v.k)} style={{padding:'9px 18px',fontSize:13,fontWeight:600,background:'transparent',color:view===v.k?'var(--bk)':'var(--g500)',borderBottom:view===v.k?'2px solid var(--bk)':'2px solid transparent',marginBottom:-2}}>{v.l}</button>)}</div>
        <div className="no-print"><FiltersBar filters={filters} setFilters={setFilters} touchpoints={allTPs}/></div>
        {view==='matrix'&&<MatrixView stages={jStages} touchpoints={filteredTPs} onClickTP={tp=>setTpModal({open:true,tp})} onAddTP={openAddTP}/>}
        {view==='journey_map'&&<JourneyMapView journey={activeJ} stages={jStages} touchpoints={filteredTPs} onClickTP={tp=>setTpModal({open:true,tp})} onUpdateTP={saveTP}/>}
        {view==='timeline'&&<TimelineView touchpoints={filteredTPs} stages={jStages} onClickTP={tp=>setTpModal({open:true,tp})}/>}
        {view==='gaps'&&<GapsView stages={jStages} touchpoints={allTPs}/>}
      </div>}
      {page==='journey'&&!activeJ&&<HomePage onNew={()=>setJModal({open:true,journey:{}})} onGoLibrary={()=>setPage('library')} onImport={()=>setImportModal(true)}/>}
    </div>

    <TPModal tp={tpModal.tp} open={tpModal.open} onClose={()=>setTpModal({open:false,tp:null})} onSave={saveTP} onDelete={deleteTP} stages={jStages}/>
    <JourneyModal journey={jModal.journey} open={jModal.open} onClose={()=>setJModal({open:false,journey:null})} onSave={saveJ}/>
    <StageModal stages={jStages} open={stageModal} onClose={()=>setStageModal(false)} onSave={saveStages} journeyId={activeJId}/>
    <LibPreviewModal journey={previewModal.journey} library={data.library} open={previewModal.open} onClose={()=>setPreviewModal({open:false,journey:null})} onClone={cloneFromLib}/>
    <ImportModal open={importModal} onClose={()=>setImportModal(false)} onImport={importJourney}/>
  </div>);
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
